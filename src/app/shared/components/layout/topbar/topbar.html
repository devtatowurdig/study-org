<header class="flex flex-col gap-3 border-b border-neutral-200 px-4 py-4 md:px-6 lg:flex-row lg:items-center lg:justify-between">
  <div class="flex w-full items-center gap-3 lg:max-w-md">
    <div class="flex w-full items-center gap-2 rounded-lg border border-neutral-200 bg-neutral-50 px-3 py-2">
      <svg class="h-4 w-4 text-neutral-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.3-4.3"></path>
      </svg>
      <input
        type="text"
        class="w-full bg-transparent text-sm text-neutral-700 outline-none"
        [placeholder]="searchPlaceholder()"
        [value]="searchValue()"
        (input)="onSearchInput($event)"
        aria-label="Buscar"
      />
    </div>
  </div>

  <div class="flex items-center justify-end gap-3">
    <button type="button" aria-label="Notificacoes" class="rounded-full p-2 text-neutral-600 hover:bg-neutral-100">
      <fa-icon [icon]="bellIcon"></fa-icon>
    </button>
    <button
      type="button"
      [attr.aria-label]="isDark() ? 'Ativar tema claro' : 'Ativar tema escuro'"
      class="rounded-full p-2 text-neutral-600 hover:bg-neutral-100"
      (click)="toggleTheme()"
    >
      <fa-icon [icon]="isDark() ? sunIcon : moonIcon"></fa-icon>
    </button>
    <div class="h-9 w-9 rounded-full bg-neutral-200 grid place-items-center text-neutral-700">
      <fa-icon [icon]="userIcon"></fa-icon>
    </div>
  </div>
</header>
